<div
  class="container mx-auto p-6 min-h-[70vh] min-w-[50vw] max-w-[90vw] max-h-[90vh]"
>
  <h1 class="text-2xl font-bold mb-4 text-center">Edit User info</h1>
  <form
    [formGroup]="userForm"
    (ngSubmit)="onSubmit()"
    class="bg-white p-6 rounded-lg shadow-md"
  >
    <!-- Full Name -->
    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2" for="name"
        >Nombre COmpleto</label
      >
      <input
        formControlName="fullName"
        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
        id="name"
        type="text"
        required
      />
    </div>
    <!-- Username -->
    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2" for="username"
        >Nombre de usuario</label
      >
      <input
        formControlName="username"
        class="shadow appearance-none border rounded w-full py-2 px-3 bg-gray-200 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
        id="username"
        type="text"
        required
        readonly
      />
    </div>
    <!-- Email -->
    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2" for="email"
        >Email</label
      >
      <input
        formControlName="email"
        class="shadow appearance-none border rounded w-full py-2 px-3 bg-gray-200 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
        id="email"
        type="text"
        required
        readonly
      />
    </div>
    <!-- Role -->
    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2" for="role"
        >Rol</label
      >
      <select
        formControlName="role"
        id="role"
        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
      >
        <option value="user">Usuario</option>
        <option value="admin">Administrador</option>
      </select>
    </div>

    <!-- New Password -->
    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2" for="newPassword"
        >Nueva contraseña</label
      >
      <input
        formControlName="newPassword"
        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
        id="newPassword"
        type="password"
      />
    </div>

    <!-- Confirm New Password -->
    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2" for="confirmNewPassword"
        >Confirmar nueva contraseña</label
      >
      <input
        formControlName="confirmNewPassword"
        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
        id="confirmNewPassword"
        type="password"
      />
      <div *ngIf="passwordMismatch" class="text-red-600 text-sm mt-2">
        Las contraseñas no coinciden.
      </div>
    </div>

    <div class="mb-4">
      <label class="block text-gray-700 font-bold mb-2" for="phone"
        >Numero de telefono</label
      >
      <input
        formControlName="phone"
        class="shadow appearance-none border rounded w-full py-2 px-3 text-gray-700 leading-tight focus:outline-none focus:shadow-outline"
        id="phone"
        type="tel"
        required
      />
    </div>
    
    <!-- Submit Button -->
    <div class="flex items-center justify-end">
      <button
        type="submit"
        [disabled]="userForm.invalid"
        class="bg-blue-500 hover:bg-blue-700 disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold py-2 px-4 rounded focus:outline-none focus:shadow-outline"
      >
        Guardar cambios
      </button>
    </div>
  </form>
</div>
